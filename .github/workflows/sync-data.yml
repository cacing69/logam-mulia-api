name: Run Sync Data

on:
  schedule:
    # 09:30 WIB (UTC+7) == 02:30 UTC
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: sync-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger sync data
        run: |
          set -uo pipefail

          # NOTE:
          # Scheduled workflows only run from the repository default branch.
          # Make sure default branch points to your deploy branch (main/next).

          TOTAL=0
          FAILED=0
          FAILED_LIST=""

          hit() {
            local url="$1"
            local name="$2"
            TOTAL=$((TOTAL + 1))
            echo ">>> Refreshing: ${name}"

            if curl -fSs --retry 3 --retry-delay 5 --retry-all-errors --max-time 120 "$url" > /tmp/resp.json; then
              echo "OK: ${name}"
            else
              echo "FAILED: ${name}"
              FAILED=$((FAILED + 1))
              FAILED_LIST="${FAILED_LIST}\n- ${name} (${url})"
            fi
          }

          hit "https://logam-mulia-api.iamutaki.workers.dev/api/prices/anekalogam?refresh=true" "anekalogam"

          SUCCESS=$((TOTAL - FAILED))
          {
            echo "## Sync Data Summary"
            echo ""
            echo "- Total endpoints: ${TOTAL}"
            echo "- Success: ${SUCCESS}"
            echo "- Failed: ${FAILED}"
            if [ "${FAILED}" -gt 0 ]; then
              echo ""
              echo "### Failed Endpoints"
              printf "%b\n" "${FAILED_LIST}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${FAILED}" -gt 0 ]; then
            exit 1
          fi
